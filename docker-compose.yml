services:
  db:
    image: postgres:16-alpine
    container_name: ac_academia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ac_academia
      POSTGRES_USER: ac_academia
      POSTGRES_PASSWORD: ac_academia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ac_academia -d ac_academia"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ac_academia_backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-AC Academia}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DATABASE_URL: postgresql+psycopg://ac_academia:ac_academia@db:5432/ac_academia
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      AUTO_CREATE_ADMIN: ${AUTO_CREATE_ADMIN:-true}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME:-Administrador}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@acacademia.com.br}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin123}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      TRAINING_MEDIA_MAX_BYTES: ${TRAINING_MEDIA_MAX_BYTES:-10485760}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: ac_academia_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backup:
    image: postgres:16-alpine
    container_name: ac_academia_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ac_academia
      POSTGRES_HOST: db
      POSTGRES_USER: ac_academia
      POSTGRES_DB: ac_academia
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backups:/backups
      - ./infra/backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
