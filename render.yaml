services:
  - type: web
    name: acacademia-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: acacademia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: https://acacademia.netlify.app
      - key: FRONTEND_PUBLIC_URL
        value: https://acacademia.netlify.app
      - key: AUTO_CREATE_ADMIN
        value: "true"
      - key: FIRST_ADMIN_NAME
        value: Administrador
      - key: FIRST_ADMIN_EMAIL
        value: admin@acacademia.com.br
      - key: FIRST_ADMIN_PASSWORD
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: "true"

databases:
  - name: acacademia-db
    databaseName: acacademia
    user: acacademia
    plan: free
